<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Resource | English Galaxy Academy</title>
    
    <!-- SEO Meta Tags will be updated dynamically via Javascript -->
    <meta name="description" content="View lesson notes, worksheets, and quizzes dynamically compiled from Markdown curriculum files.">
    
    <link rel="stylesheet" href="assets/css/style.css">
<script src="/assets/js/theme-loader.js"></script>
</head>
<body>

    <div id="header-wrapper"></div>

    <main class="container section">
        <!-- Breadcrumbs -->
        <ul class="breadcrumbs" id="breadcrumbs-list">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-separator">></li>
            <li class="breadcrumb-item active">Loading...</li>
        </ul>

        <div class="sidebar-layout">
            <!-- Dynamic Content Main Area -->
            <article class="main-content" style="grid-column: 1 / -1;">
                <!-- Header Metadata Wrapper -->
                <div class="viewer-header" id="viewer-header-wrapper">
                    <h1 style="color: var(--text-muted);" data-i18n="viewer_loading_title">Loading Resource Content...</h1>
                </div>

                <!-- Compiled Markdown Body Container -->
                <div id="viewer-content">
                    <div style="text-align: center; padding: var(--space-xxl) 0;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary); animation: spin 1.5s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                        <p style="margin-top: var(--space-md); color: var(--text-muted);" data-i18n="viewer_fetching">Fetching educational content from server...</p>
                    </div>
                </div>

                <!-- Related Resources Recommendations -->
                <div id="related-resources-wrapper"></div>
            </article>
        </div>
    </main>

    <div id="footer-wrapper"></div>

    <!-- Compile Engine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/content-loader.js"></script>
</body>
</html>
