<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Details | English Galaxy Academy</title>
    
    <!-- SEO Meta Tags  dynamically updated via unit-hub.js -->
    <meta name="description" content="Explore unit learning outcomes, vocabulary, and curriculum-aligned teaching resources for English Galaxy Academy.">
    <meta name="keywords" content="English unit, MEB curriculum, learning outcomes, English worksheets, vocabulary practice">
    <link rel="canonical" href="https://englishgalaxyacademy.com/unit.html">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Unit Details | English Galaxy Academy">
    <meta property="og:description" content="Explore unit learning outcomes, vocabulary, and curriculum-aligned teaching resources.">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="assets/css/style.css">
<script src="/assets/js/theme-loader.js"></script>
</head>
<body>

    <!-- Shared Header Wrapper -->
    <div id="header-wrapper"></div>

    <!-- Main Content Area -->
    <main class="container section" id="unit-hub-container">
        <!-- Loading state -->
        <div class="unit-hub-loading" id="unit-hub-loading">
            <div style="text-align: center; padding: var(--space-xxl) 0;">
                <span style="font-size: 3rem; animation: float 2s ease-in-out infinite; display: inline-block;">📖</span>
                <p style="margin-top: var(--space-md); color: var(--text-muted); font-size: 1.1rem;" data-i18n="unit_loading">Loading unit details...</p>
            </div>
        </div>

        <!-- Error State (hidden by default) -->
        <div class="unit-hub-error" id="unit-hub-error" style="display: none;">
            <div class="empty-state">
                <div class="empty-state-icon">a️</div>
                <h2 class="empty-state-title" data-i18n="unit_not_found">Unit Not Found</h2>
                <p class="empty-state-desc" data-i18n="unit_not_found_desc">The requested unit could not be found. Please navigate from a grade hub.</p>
                <a href="index.html" class="btn btn-primary" data-i18n="unit_return">Return Home</a>
            </div>
        </div>

        <!-- Dynamic Content (populated by unit-hub.js) -->
        <div id="unit-hub-content" style="display: none;">

            <!-- Breadcrumbs -->
            <div id="unit-breadcrumbs" style="margin-bottom: var(--space-xl); border-bottom: 1px solid var(--border-color); padding-bottom: var(--space-md);"></div>

            <!-- Unit Hero Header -->
            <div class="unit-hero" id="unit-hero-section">
                <!-- Populated dynamically -->
            </div>

            <!-- Coverage Progress Strip -->
            <div class="unit-coverage-strip" id="unit-coverage-strip">
                <!-- Populated dynamically -->
            </div>

            <!-- Main Content Grid -->
            <div class="unit-main-grid">

                <!-- Left Column: Outcomes + Resources -->
                <div class="unit-main-column">


                    <!-- Resources Grid -->
                    <section class="unit-card" id="unit-resources-card">
                        <div class="unit-card-header">
                            <h2 class="unit-card-title" data-i18n="unit_resources">📚 Teaching & Learning Resources</h2>
                            <div class="unit-resource-filters" id="unit-resource-filters">
                                <!-- Type filter chips populated dynamically -->
                            </div>
                        </div>
                        <div class="unit-card-body" id="unit-resources-grid">
                            <!-- Populated dynamically -->
                        </div>
                    </section>
                </div>

                <!-- Right Sidebar: Vocabulary + Meta -->
                <aside class="unit-sidebar-column">

                    <!-- Unit Metadata Panel -->
                    <div class="unit-card unit-meta-card" id="unit-meta-card">
                        <div class="unit-card-header">
                            <h3 class="unit-card-title" data-i18n="unit_info">📋 Unit Information</h3>
                        </div>
                        <div class="unit-card-body" id="unit-meta-body">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <!-- Vocabulary Panel -->
                    <div class="unit-card" id="unit-vocabulary-card">
                        <div class="unit-card-header">
                            <h3 class="unit-card-title" data-i18n="unit_vocab">📌 Target Vocabulary</h3>
                        </div>
                        <div class="unit-card-body" id="unit-vocabulary-list">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <!-- Quick Navigation -->
                    <div class="unit-card" id="unit-quick-nav">
                        <div class="unit-card-header">
                            <h3 class="unit-card-title">🧭 Quick Navigation</h3>
                        </div>
                        <div class="unit-card-body" id="unit-quick-nav-body">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Shared Footer Wrapper -->
    <div id="footer-wrapper"></div>

    <!-- Interactive Overlays (Minimalist Modals) -->
    <style>
    /* Modals */
    .overlay-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.7); z-index: 1000;
        display: none; justify-content: center; align-items: center;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    .modal-card {
        background-color: var(--bg-surface); padding: var(--space-xl);
        border-radius: var(--radius-lg); width: 90%; max-width: 600px;
        box-shadow: var(--shadow-hover); position: relative;
        border: 1px solid var(--border-color);
    }
    .modal-close {
        position: absolute; top: var(--space-md); right: var(--space-md);
        background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);
    }
    .modal-close:hover { color: var(--error); }
    .mic-btn {
        width: 80px; height: 80px; border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white; border: none; font-size: 2rem;
        cursor: pointer; display: flex; justify-content: center; align-items: center;
        margin: 0 auto var(--space-md) auto; transition: transform 0.2s;
        box-shadow: 0 4px 15px rgba(37,99,235,0.3);
    }
    .mic-btn:hover { transform: scale(1.05); }
    .mic-btn.recording { animation: pulse 1.5s infinite; background: var(--error); }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .quiz-options { display: flex; flex-direction: column; gap: var(--space-sm); }
    .quiz-option-btn {
        padding: var(--space-md); text-align: left; background-color: var(--bg-card);
        border: 1px solid var(--border-color); border-radius: var(--radius-md);
        cursor: pointer; font-family: var(--font-primary); font-size: 1rem;
        color: var(--text-main); transition: var(--transition);
    }
    .quiz-option-btn:hover { border-color: var(--primary); background-color: rgba(37,99,235,0.05); }
    </style>

    <div class="overlay-modal" id="speaking-modal">
        <div class="modal-card" style="text-align: center;">
            <button class="modal-close" onclick="closeSpeakingAssistant()"></button>
            <h2 style="margin-bottom: var(--space-lg);">🎙️ Speaking Practice</h2>
            <button class="mic-btn" id="btn-mic" onclick="toggleRecording()">🎤</button>
            <div id="speaking-text" style="font-size: 1.2rem; min-height: 3rem; margin-bottom: var(--space-md); color: var(--text-main);">Click the microphone to start speaking...</div>
            <div id="speaking-feedback" style="color: var(--success); font-weight: 600;"></div>
        </div>
    </div>

    <div class="overlay-modal" id="quiz-modal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeUnitQuiz()"></button>
            <div id="quiz-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/taxonomy.js"></script>
    <script src="assets/js/unit-hub.js"></script>
    <script src="assets/js/speaking-assistant.js"></script>
    <script src="assets/js/quiz-engine.js"></script>
</body>
</html>
